<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}F1 AI Strategy{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-950 text-slate-50 min-h-screen">

    <div class="h-1 w-full bg-gradient-to-r from-emerald-400 via-sky-400 to-fuchsia-500"></div>

    <nav class="border-b border-slate-800 bg-slate-950/90 backdrop-blur sticky top-0 z-30">
      <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="h-2 w-2 rounded-full bg-emerald-400 animate-pulse mr-1"></div>
          <span class="font-semibold tracking-tight">F1 AI Strategy</span>
          <span class="ml-2 text-xs text-slate-500 hidden sm:inline">
            Random Forest · FastF1
          </span>
        </div>
        <div class="flex items-center gap-1 text-sm">
          <a href="{{ url_for('index') }}"
             class="px-3 py-1.5 rounded-lg transition
             {% if request.endpoint == 'index' %}bg-slate-800 text-emerald-300 font-semibold{% else %}hover:bg-slate-800 hover:text-slate-200 text-slate-400{% endif %}">
            🧪 Model Performance
          </a>
          <a href="{{ url_for('analysis_page') }}"
             class="px-3 py-1.5 rounded-lg transition
             {% if request.endpoint == 'analysis_page' %}bg-slate-800 text-emerald-300 font-semibold{% else %}hover:bg-slate-800 hover:text-slate-200 text-slate-400{% endif %}">
            🔍 Strategy Analysis
          </a>
          <a href="{{ url_for('play_strategy_page') }}"
             class="px-3 py-1.5 rounded-lg transition
             {% if request.endpoint == 'play_strategy_page' %}bg-slate-800 text-emerald-300 font-semibold{% else %}hover:bg-slate-800 hover:text-slate-200 text-slate-400{% endif %}">
            ⚙️ Custom Strategy
          </a>
        </div>
      </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-6 space-y-6">
      {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
  </body>
</html>
